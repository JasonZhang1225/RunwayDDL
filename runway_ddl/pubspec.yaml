name: runway_ddl
description: "RunwayDDL - A deadline management tool for students"
publish_to: 'none'

version: 0.1.0-alpha.1+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0
